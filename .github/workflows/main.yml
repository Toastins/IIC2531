name: Build PDFs from Labs Markdown

on:
  push:
    paths:
      - "2026-1/Labs/**/*.md"
      - ".github/workflows/main.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Convert Labs Markdown files to PDF
        run: |
          find ./2026-1/Labs -type f -name "*.md" -print0 |
          while IFS= read -r -d '' file; do
            dir="$(dirname "$file")"
            base="$(basename "$file" .md)"

            if [ ! -s "$file" ]; then
              echo "Skipping empty file: $file"
              continue
            fi

            echo "Converting: $file"

            (
              cd "$dir"
              pandoc "$base.md" -o "$base.pdf" \
                --pdf-engine=xelatex \
                -V geometry:margin=0.5in
            ) || {
              echo "Skipping failed conversion: $file"
              rm -f "$dir/$base.pdf"
            }
          done

      - name: Commit and push generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add 2026-1/Labs/**/*.pdf

          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
            exit 0
          fi

          git commit -m "Generate PDFs from labs markdown [skip ci]"
          git push
